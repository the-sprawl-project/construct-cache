syntax = "proto3";
package socket_messages;

message KeyValuePair {
  string key = 1;
  string value = 2;
  int64 timestamp = 3;
}

enum ReqType {
  PING = 0;
  CREATE = 1;
  READ = 2;
  UPDATE = 3;
  DELETE = 4;
  COMMIT = 5;
  ROLLBACK = 6;
  LIST_SNAPSHOTS = 7;
  TIME_TRAVEL = 8;
  SYNC = 9;
  REPLICATE_CREATE = 10;
  REPLICATE_UPDATE = 11;
  REPLICATE_DELETE = 12;
}

message GenericRequest {
  ReqType req_type = 1;
  bytes payload = 2;
}

message GenericResponse {
  ReqType req_type = 1;
  bytes payload = 2;
}

message PingRequest {
  string ping_message = 1;
}

message PingResponse {
  string ping_resp_message = 1;
}

message CreateKVPairReq {
  KeyValuePair pair = 1;
}

message CommitReq {
}

message RollbackReq {
  int64 snapshot_id = 1;
}

message ListSnapshotsReq {
  string table_name = 1;
}

message SnapshotMsg {
  int64 id = 1;
  int64 timestamp_ms = 2;
  string manifest_list = 3;
  map<string, string> summary = 4;
}

message ListSnapshotsResp {
  bool success = 1;
  repeated SnapshotMsg snapshots = 2;
}

message TimeTravelReq {
  int64 snapshot_id = 1;
}

message TimeTravelResp {
  bool success = 1;
}

message CreateKVPairResp {
  // Returns true if creating the key-value pair was successful.
  // If the key-value pair already exists, returns false.
  bool success = 1;
}

message ReadKVPairReq {
  string key = 1;
}

message ReadKVPairResp {
  // Success indicates whether the key was found in the store
  bool success = 1;
  // The pair is the actual KV pair if the key was found
  KeyValuePair pair = 2;
}

message UpdateKVPairReq {
  KeyValuePair pair = 1;
}

message UpdateKVPairResp {
  bool success = 1;
}

message DeleteKVPairReq {
  string key = 1;
}

message DeleteKVPairResp {
  bool success = 1;
}

message CommitResp {
  bool success = 1;
}

message RollbackResp {
  bool success = 1;
}

message SyncReq {
  ReqType op_type = 1;
  KeyValuePair pair = 2;
  string key = 3;
  string sender_addr = 4;
}

message SyncResp {
  bool success = 1;
}
